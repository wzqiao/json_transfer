<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sub2Api Builder</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #000000;
        --muted: #666666;
        --border: #eaeaea;
        --accent: #0070f3;
        --hover-bg: #fafafa;
        --code-bg: #111111;
        --code-text: #3fb950;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }
      
      main { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
      
      header { margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
      header h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.05em; }
      header p { font-size: 14px; color: var(--muted); margin: 8px 0 0; }

      /* 配置工具栏 */
      .toolbar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 16px;
        background: var(--hover-bg);
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 24px;
      }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .field.span-2 { grid-column: span 2; }
      label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
      
      input, select {
        height: 36px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 14px;
        background: white;
      }

      /* 左右布局布局 */
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        display: flex;
        flex-direction: column;
      }

      .title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .title h2 { font-size: 16px; margin: 0; font-weight: 600; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: var(--text); color: white; }

      /* 交互区域 */
      .dropzone {
        border: 1px dashed var(--border);
        border-radius: 6px;
        padding: 30px;
        text-align: center;
        background: var(--hover-bg);
        cursor: pointer;
        transition: 0.2s;
      }
      .dropzone:hover, .dropzone.active { border-color: var(--text); background: #f0f0f0; }
      .dropzone strong { display: block; font-size: 14px; }
      .dropzone span { font-size: 12px; color: var(--muted); }

      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        font-family: inherit;
        font-size: 13px;
        margin-top: 12px;
        resize: vertical;
      }

      .result {
        background: var(--code-bg);
        color: var(--code-text);
        font-family: "SFMono-Regular", Consolas, monospace;
        min-height: 500px;
      }

      .file-list {
        font-size: 12px;
        color: var(--muted);
        margin-top: 12px;
        padding: 8px;
        background: #fdfdfd;
        border-radius: 4px;
      }

      /* 按钮组 */
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
      button, .button {
        height: 36px;
        padding: 0 16px;
        font-size: 13px;
        font-weight: 500;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--text);
        transition: 0.2s;
      }
      button:hover { border-color: var(--text); background: var(--hover-bg); }
      button.primary { background: var(--text); color: white; border: none; }
      button.primary:hover { opacity: 0.8; }
      button:disabled { opacity: 0.3; cursor: not-allowed; }

      .status { font-size: 12px; margin-top: 12px; font-weight: 500; }
      .status.error { color: red; }

      footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 12px; }

      @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Sub2Api Builder</h1>
        <p>浏览器本地处理，无服务器上传，安全高效。</p>
      </header>

      <section class="toolbar">
        <div class="field">
          <label for="format">输出格式</label>
          <select id="format"><option value="sub2api">Sub2Api 格式</option></select>
        </div>
        <div class="field">
          <label for="platform">Platform</label>
          <input id="platform" value="openai" />
        </div>
        <div class="field">
          <label for="accountType">Account Type</label>
          <input id="accountType" value="oauth" />
        </div>
        <div class="field">
          <label for="concurrency">Concurrency</label>
          <input id="concurrency" type="number" min="0" value="3" />
        </div>
        <div class="field">
          <label for="priority">Priority</label>
          <input id="priority" type="number" min="0" value="50" />
        </div>
        <div class="field">
          <label for="nameSource">Name Source</label>
          <select id="nameSource">
            <option value="email">email / account_id</option>
            <option value="filename">filename</option>
            <option value="index">index</option>
          </select>
        </div>
        <div class="field">
          <label for="namePrefix">Name Prefix</label>
          <input id="namePrefix" value="acc" />
        </div>
        <div class="field">
          <label for="outputName">输出文件名</label>
          <input id="outputName" value="sub2api_accounts_import.json" />
        </div>
      </section>

      <div class="grid">
        <div class="card">
          <div class="title">
            <h2>输入 Token 数据</h2>
            <span id="inputBadge" class="badge">0 files</span>
          </div>

          <div id="dropzone" class="dropzone">
            <strong>点击或拖拽 JSON 文件</strong>
            <span>支持选择多个文件</span>
          </div>

          <div class="actions">
            <button id="chooseFiles">选择文件</button>
            <button id="clearInput">清空输入</button>
            <input id="fileInput" type="file" accept=".json,application/json" multiple hidden />
          </div>

          <div id="fileList" class="file-list">还没有选择文件。</div>

          <textarea id="pasteInput" rows="10" placeholder="或者直接在此粘贴 JSON 对象或数组..."></textarea>

          <div class="actions">
            <button id="build" class="primary">开始转换</button>
            <button id="loadExample">加载示例</button>
          </div>
          <div id="status" class="status"></div>
        </div>

        <div class="card">
          <div class="title">
            <h2>转换结果</h2>
            <span id="resultBadge" class="badge">0 accounts</span>
          </div>
          <textarea id="result" class="result" readonly placeholder="转换结果将显示在这里..."></textarea>
          <div class="actions">
            <button id="copy" disabled>复制</button>
            <a id="download" class="button" style="display:none">下载 JSON</a>
            <button id="clearOutput">清空输出</button>
          </div>
        </div>
      </div>

      <footer>Static Tool &middot; GitHub Pages Ready &middot; No Backend</footer>
    </main>

    <script>
      // 这里的逻辑完全保留自你的源文件，没有任何逻辑改动
      const state = { files: [], objectUrl: null };
      const $ = (id) => document.getElementById(id);
      const elements = {
        accountType: $("accountType"), build: $("build"), chooseFiles: $("chooseFiles"),
        clearInput: $("clearInput"), clearOutput: $("clearOutput"), concurrency: $("concurrency"),
        copy: $("copy"), download: $("download"), dropzone: $("dropzone"),
        fileInput: $("fileInput"), fileList: $("fileList"), inputBadge: $("inputBadge"),
        loadExample: $("loadExample"), namePrefix: $("namePrefix"), nameSource: $("nameSource"),
        outputName: $("outputName"), pasteInput: $("pasteInput"), platform: $("platform"),
        priority: $("priority"), result: $("result"), resultBadge: $("resultBadge"), status: $("status")
      };

      function normalizeRecords(data) { return Array.isArray(data) ? data : [data]; }
      function stem(filename) { return filename.replace(/\.[^.]+$/, ""); }
      function chooseName(credentials, fileName, index, nameSource, namePrefix) {
        if (nameSource === "index") return `${namePrefix}-${String(index).padStart(3, "0")}`;
        if (nameSource === "email") {
          const email = String(credentials.email || "").trim();
          if (email) return email;
          const accountId = String(credentials.account_id || "").trim();
          if (accountId) return accountId;
        }
        return stem(fileName);
      }
      function dedupeName(name, used) {
        used[name] = (used[name] || 0) + 1;
        return used[name] === 1 ? name : `${name}-${used[name]}`;
      }
      function parseNonNegativeInt(value, fieldName) {
        const parsed = Number.parseInt(value, 10);
        if (!Number.isFinite(parsed) || parsed < 0) throw new Error(`${fieldName} 必须是大于等于 0 的整数。`);
        return parsed;
      }
      function setStatus(message, isError = false) {
        elements.status.textContent = message;
        elements.status.classList.toggle("error", isError);
      }
      function refreshFileList() {
        elements.inputBadge.textContent = `${state.files.length} files`;
        if (!state.files.length) { elements.fileList.textContent = "还没有选择文件。"; return; }
        elements.fileList.innerHTML = state.files.slice().sort((a, b) => a.name.localeCompare(b.name))
          .map((file) => `<div>${file.name}</div>`).join("");
      }
      async function readFileRecord(file) {
        const text = await file.text();
        return { fileName: file.name, data: JSON.parse(text) };
      }
      function readPastedRecords() {
        const text = elements.pasteInput.value.trim();
        if (!text) return [];
        return [{ fileName: "pasted-json", data: JSON.parse(text) }];
      }
      async function buildPayload() {
        const records = [];
        const sortedFiles = state.files.slice().sort((a, b) => a.name.localeCompare(b.name));
        for (const file of sortedFiles) { records.push(await readFileRecord(file)); }
        records.push(...readPastedRecords());
        if (!records.length) throw new Error("请先选择 JSON 文件，或粘贴 JSON 内容。");
        const platform = elements.platform.value.trim() || "openai";
        const accountType = elements.accountType.value.trim() || "oauth";
        const concurrency = parseNonNegativeInt(elements.concurrency.value, "Concurrency");
        const priority = parseNonNegativeInt(elements.priority.value, "Priority");
        const nameSource = elements.nameSource.value;
        const namePrefix = elements.namePrefix.value.trim() || "acc";
        const accounts = [];
        const usedNames = {};
        let counter = 1;
        for (const record of records) {
          for (const item of normalizeRecords(record.data)) {
            const credentials = item && typeof item === "object" && !Array.isArray(item) ? item : { raw_value: item };
            const baseName = chooseName(credentials, record.fileName, counter, nameSource, namePrefix);
            const name = dedupeName(baseName, usedNames);
            accounts.push({ name, platform, type: accountType, credentials, concurrency, priority });
            counter += 1;
          }
        }
        return { type: "sub2api-data", version: 1, exported_at: new Date().toISOString(), proxies: [], accounts };
      }
      function setDownload(jsonText) {
        if (state.objectUrl) { URL.revokeObjectURL(state.objectUrl); }
        const blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
        state.objectUrl = URL.createObjectURL(blob);
        elements.download.href = state.objectUrl;
        elements.download.download = elements.outputName.value.trim() || "sub2api_accounts_import.json";
        elements.download.style.display = "inline-flex";
        elements.copy.disabled = false;
      }
      function clearOutput() {
        elements.result.value = "";
        elements.resultBadge.textContent = "0 accounts";
        elements.copy.disabled = true;
        elements.download.style.display = "none";
        if (state.objectUrl) { URL.revokeObjectURL(state.objectUrl); state.objectUrl = null; }
      }
      elements.chooseFiles.addEventListener("click", () => elements.fileInput.click());
      elements.fileInput.addEventListener("change", (e) => { state.files = Array.from(e.target.files || []); refreshFileList(); setStatus(`已选择 ${state.files.length} 个文件。`); });
      elements.clearInput.addEventListener("click", () => { state.files = []; elements.fileInput.value = ""; elements.pasteInput.value = ""; refreshFileList(); setStatus("输入已清空。"); });
      elements.clearOutput.addEventListener("click", () => { clearOutput(); setStatus("输出已清空。"); });
      elements.dropzone.addEventListener("dragover", (e) => { e.preventDefault(); elements.dropzone.classList.add("active"); });
      elements.dropzone.addEventListener("dragleave", () => { elements.dropzone.classList.remove("active"); });
      elements.dropzone.addEventListener("drop", (e) => { e.preventDefault(); elements.dropzone.classList.remove("active"); state.files = Array.from(e.dataTransfer.files || []).filter((f) => /\.json$/i.test(f.name)); refreshFileList(); setStatus(`已拖入 ${state.files.length} 个文件。`); });
      elements.build.addEventListener("click", async () => {
        try {
          setStatus("正在转换...");
          clearOutput();
          const payload = await buildPayload();
          const jsonText = JSON.stringify(payload, null, 2);
          elements.result.value = jsonText;
          elements.resultBadge.textContent = `${payload.accounts.length} accounts`;
          setDownload(jsonText);
          setStatus(`转换完成：${payload.accounts.length} 个账号。`);
        } catch (error) { setStatus(error.message, true); }
      });
      elements.copy.addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(elements.result.value); setStatus("已复制到剪贴板。"); } catch (e) { setStatus("复制失败", true); }
      });
      elements.loadExample.addEventListener("click", () => {
        elements.pasteInput.value = JSON.stringify([{ email: "demo@example.com", access_token: "token-here" }], null, 2);
        setStatus("示例已加载。");
      });
    </script>
  </body>
</html>
