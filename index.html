<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sub2Api Account Payload Builder</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #171717;
        --muted: #666666;
        --border: #eaeaea;
        --primary: #000000;
        --code-bg: #0a0a0a;
        --success: #10b981;
        --danger: #ef4444;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
      main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
      
      header { margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
      header h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.05em; }
      header p { font-size: 14px; color: var(--muted); margin: 4px 0 0; }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
        background: #fafafa;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 32px;
      }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .field.span-2 { grid-column: span 2; }
      label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
      
      input, select, textarea {
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 14px;
        padding: 8px 12px;
        outline: none;
      }
      input, select { height: 38px; background: white; }

      .hint {
        grid-column: 1 / -1;
        font-size: 12px;
        color: var(--muted);
        padding-top: 12px;
        border-top: 1px solid var(--border);
        line-height: 1.6;
      }

      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
      .card { display: flex; flex-direction: column; }
      .title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .title h2 { font-size: 16px; font-weight: 600; margin: 0; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #000; color: #fff; }

      .dropzone {
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 40px 20px;
        text-align: center;
        background: #fff;
        cursor: pointer;
        transition: 0.2s;
      }
      /* 修复拖拽时的视觉反馈 */
      .dropzone.active { border-color: var(--primary); background: #f0f7ff; }
      .dropzone:hover { border-color: var(--text); background: #f9f9f9; }
      
      .file-list { font-size: 12px; color: var(--muted); margin: 12px 0; padding: 10px; background: #fafafa; border-radius: 6px; min-height: 40px; line-height: 1.6; }
      .paste-area { min-height: 180px; font-family: monospace; }
      .result { background: var(--code-bg); color: #3fb950; font-family: monospace; font-size: 12px; min-height: 520px; padding: 20px; border: none; }

      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
      button, .button {
        height: 36px; padding: 0 16px; font-size: 13px; font-weight: 500; border-radius: 6px;
        cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text);
        display: inline-flex; align-items: center; text-decoration: none;
      }
      button:hover { border-color: var(--text); background: #fafafa; }
      button.primary { background: #000; color: #fff; border: none; }
      button.success, .button.success { border-color: var(--success); color: var(--success); }
      button:disabled, .button.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

      .status { font-size: 12px; margin-top: 12px; font-weight: 500; color: var(--muted); }
      .status.error { color: var(--danger); }

      @media (max-width: 850px) { .grid, .toolbar { grid-template-columns: 1fr; } .field.span-2 { grid-column: auto; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Sub2Api Builder</h1>
        <p>浏览器本地转换，100% 隐私安全。</p>
      </header>

      <section class="toolbar">
        <div class="field">
          <label for="format">输出格式</label>
          <select id="format">
            <option value="sub2api">Sub2Api 格式</option>
            <option value="codex">Codex 格式</option>
            <option value="cpa">CPA 格式</option>
          </select>
        </div>
        <div class="field">
          <label for="platform">Platform</label>
          <input id="platform" value="openai" />
        </div>
        <div class="field">
          <label for="accountType">Account Type</label>
          <input id="accountType" value="oauth" />
        </div>
        <div class="field">
          <label for="concurrency">Concurrency</label>
          <input id="concurrency" type="number" min="0" value="3" />
        </div>
        <div class="field">
          <label for="priority">Priority</label>
          <input id="priority" type="number" min="0" value="50" />
        </div>
        <div class="field">
          <label for="nameSource">Name Source</label>
          <select id="nameSource">
            <option value="email">email / account_id</option>
            <option value="filename">filename</option>
            <option value="index">index</option>
          </select>
        </div>
        <div class="field span-2">
          <label for="namePrefix">Name Prefix</label>
          <input id="namePrefix" value="acc" />
        </div>
        <div class="field span-2">
          <label for="outputName">输出文件名</label>
          <input id="outputName" value="sub2api_accounts_import.json" />
        </div>
      </section>

      <div class="grid">
        <div class="card">
          <div class="title"><h2>输入数据</h2><span id="inputBadge" class="badge">0 files</span></div>
          <div id="dropzone" class="dropzone"><strong>拖拽 JSON 到此处</strong><span>或点击下方选择文件</span></div>
          <div class="actions">
            <button id="chooseFiles">选择文件</button>
            <button id="clearInput">清空</button>
            <input id="fileInput" type="file" multiple hidden />
          </div>
          <div id="fileList" class="file-list">还没有选择文件。</div>
          <textarea id="pasteInput" class="paste-area" placeholder="或者直接粘贴 JSON 数组..."></textarea>
          <div class="actions">
            <button id="build" class="primary">开始转换</button>
            <button id="loadExample" class="success">加载示例</button>
          </div>
          <div id="status" class="status"></div>
        </div>

        <div class="card">
          <div class="title"><h2>结果预览</h2><span id="resultBadge" class="badge">0 accounts</span></div>
          <textarea id="result" class="result" readonly></textarea>
          <div class="actions">
            <button id="copy" class="success" disabled>复制</button>
            <a id="download" class="button disabled" href="#">下载</a>
            <button id="clearOutput">重置</button>
          </div>
        </div>
      </div>
    </main>

    <script>
      /* 逻辑 100% 还原自源文件 */
      const state = { files: [], objectUrl: null };
      const $ = (id) => document.getElementById(id);
      const elements = {
        format: $("format"), accountType: $("accountType"), build: $("build"), 
        chooseFiles: $("chooseFiles"), clearInput: $("clearInput"), clearOutput: $("clearOutput"), 
        concurrency: $("concurrency"), copy: $("copy"), download: $("download"), 
        dropzone: $("dropzone"), fileInput: $("fileInput"), fileList: $("fileList"), 
        inputBadge: $("inputBadge"), loadExample: $("loadExample"), namePrefix: $("namePrefix"), 
        nameSource: $("nameSource"), outputName: $("outputName"), pasteInput: $("pasteInput"), 
        platform: $("platform"), priority: $("priority"), result: $("result"), 
        resultBadge: $("resultBadge"), status: $("status")
      };

      // 还原源文件的辅助工具函数
      function normalizeRecords(data) { return Array.isArray(data) ? data : [data]; }
      function stem(filename) { return filename.replace(/\.[^.]+$/, ""); }
      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }
      function escapeHtml(value) {
        return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }
      function setStatus(msg, isErr = false) { 
        elements.status.textContent = msg; 
        elements.status.classList.toggle("error", isErr); 
      }
      function refreshFileList() {
        elements.inputBadge.textContent = `${state.files.length} files`;
        if (!state.files.length) { elements.fileList.textContent = "还没有选择文件。"; return; }
        elements.fileList.innerHTML = state.files.slice().sort((a,b) => a.name.localeCompare(b.name))
          .map(f => `${escapeHtml(f.name)} <small>(${formatBytes(f.size)})</small>`).join("<br>");
      }

      // 核心业务逻辑 (1:1 还原)
      function chooseName(creds, fName, idx, src, pre) {
        if (src === "index") return `${pre}-${String(idx).padStart(3, "0")}`;
        if (src === "email") {
          const email = String(creds.email || "").trim(); if (email) return email;
          const aid = String(creds.account_id || "").trim(); if (aid) return aid;
        }
        return stem(fName);
      }
      function dedupeName(name, used) {
        used[name] = (used[name] || 0) + 1;
        return used[name] === 1 ? name : `${name}-${used[name]}`;
      }
      async function buildPayload() {
        const records = [];
        const sorted = state.files.slice().sort((a,b) => a.name.localeCompare(b.name));
        for (const f of sorted) { records.push({ fileName: f.name, data: JSON.parse(await f.text()) }); }
        const paste = elements.pasteInput.value.trim();
        if (paste) records.push({ fileName: "pasted-json", data: JSON.parse(paste) });
        if (!records.length) throw new Error("请先选择 JSON 文件，或粘贴 JSON 内容。");

        const accounts = [];
        const usedNames = {};
        let counter = 1;
        for (const r of records) {
          for (const item of normalizeRecords(r.data)) {
            const creds = item && typeof item === "object" && !Array.isArray(item) ? item : { raw_value: item };
            const name = dedupeName(chooseName(creds, r.fileName, counter, elements.nameSource.value, elements.namePrefix.value), usedNames);
            accounts.push({
              name, platform: elements.platform.value.trim() || "openai", type: elements.accountType.value.trim() || "oauth",
              credentials: creds, concurrency: parseInt(elements.concurrency.value), priority: parseInt(elements.priority.value)
            });
            counter++;
          }
        }
        return { 
          type: elements.format.value + "-data", 
          version: 1, exported_at: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"), 
          proxies: [], accounts 
        };
      }

      // 修复下载和结果展示
      function setDownload(jsonText) {
        if (state.objectUrl) URL.revokeObjectURL(state.objectUrl);
        state.objectUrl = URL.createObjectURL(new Blob([jsonText], { type: "application/json;charset=utf-8" }));
        elements.download.href = state.objectUrl;
        elements.download.download = elements.outputName.value.trim() || "export.json";
        elements.download.classList.remove("disabled");
        elements.copy.disabled = false;
      }
      function clearOutput() {
        elements.result.value = ""; elements.resultBadge.textContent = "0 accounts";
        elements.copy.disabled = true; elements.download.classList.add("disabled");
        if (state.objectUrl) { URL.revokeObjectURL(state.objectUrl); state.objectUrl = null; }
      }

      // 事件监听 (补全拖拽部分)
      elements.chooseFiles.onclick = () => elements.fileInput.click();
      elements.fileInput.onchange = (e) => { state.files = Array.from(e.target.files || []); refreshFileList(); setStatus(`已选择 ${state.files.length} 个文件。`); };
      
      elements.dropzone.addEventListener("dragover", (e) => { e.preventDefault(); elements.dropzone.classList.add("active"); });
      elements.dropzone.addEventListener("dragleave", () => { elements.dropzone.classList.remove("active"); });
      elements.dropzone.addEventListener("drop", (e) => {
        e.preventDefault(); elements.dropzone.classList.remove("active");
        const dropped = Array.from(e.dataTransfer.files || []).filter(f => /\.json$/i.test(f.name));
        state.files = dropped; refreshFileList(); setStatus(`已拖入 ${state.files.length} 个 JSON 文件。`);
      });

      elements.build.onclick = async () => {
        try {
          setStatus("正在转换..."); clearOutput();
          const payload = await buildPayload();
          const jsonText = JSON.stringify(payload, null, 2);
          elements.result.value = jsonText;
          elements.resultBadge.textContent = `${payload.accounts.length} accounts`;
          setDownload(jsonText); setStatus(`转换完成：${payload.accounts.length} 个账号。`);
        } catch (error) { setStatus(error.message, true); }
      };

      elements.copy.onclick = async () => { try { await navigator.clipboard.writeText(elements.result.value); setStatus("已复制到剪贴板。"); } catch (e) { setStatus("复制失败", true); } };
      elements.clearInput.onclick = () => { state.files = []; elements.fileInput.value = ""; elements.pasteInput.value = ""; refreshFileList(); setStatus("输入已清空。"); };
      elements.clearOutput.onclick = () => { clearOutput(); setStatus("输出已清空。"); };
      elements.loadExample.onclick = () => { elements.pasteInput.value = JSON.stringify([{ email: "demo@example.com", access_token: "token-demo" }], null, 2); setStatus("示例已加载。"); };
    </script>
  </body>
</html>
