<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sub2Api Account Payload Builder</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #171717;
        --muted: #666666;
        --border: #eaeaea;
        --primary: #000000;
        --accent: #0070f3;
        --code-bg: #0a0a0a;
        --success: #10b981;
        --danger: #ef4444;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
      
      main { max-width: 1000px; margin: 0 auto; padding: 60px 24px; }
      
      header { margin-bottom: 48px; }
      header h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.05em; }
      header p { font-size: 14px; color: var(--muted); margin: 8px 0 0; }

      /* 配置区域：紧凑型网格 */
      .toolbar {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 32px;
      }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .field.span-2 { grid-column: span 2; }
      label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
      
      input, select, textarea {
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 14px;
        padding: 8px 12px;
        transition: border-color 0.2s;
        outline: none;
      }
      input:focus, select:focus, textarea:focus { border-color: var(--text); }
      input, select { height: 38px; }

      .hint {
        grid-column: 1 / -1;
        font-size: 12px;
        color: var(--muted);
        padding-top: 12px;
        border-top: 1px solid var(--border);
        line-height: 1.6;
      }

      /* 工作区布局 */
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

      .workspace { display: flex; flex-direction: column; }
      .title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .title h2 { font-size: 16px; font-weight: 600; margin: 0; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f5f5f5; color: var(--muted); border: 1px solid var(--border); }

      /* 拖拽上传 */
      .dropzone {
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 40px 20px;
        text-align: center;
        background: #fafafa;
        cursor: pointer;
        transition: 0.2s;
      }
      .dropzone:hover, .dropzone.active { border-color: var(--text); background: #f0f0f0; }
      .dropzone strong { display: block; font-size: 14px; margin-bottom: 4px; }
      .dropzone span { font-size: 12px; color: var(--muted); }

      .file-list {
        font-size: 12px;
        color: var(--muted);
        margin: 12px 0;
        padding: 10px;
        background: #fafafa;
        border-radius: 6px;
        max-height: 100px;
        overflow-y: auto;
      }

      .paste-area { min-height: 180px; width: 100%; margin-top: 8px; font-family: monospace; }

      /* 结果区域 */
      .result {
        background: var(--code-bg);
        color: #d4d4d4;
        font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
        font-size: 12px;
        min-height: 520px;
        border: none;
        padding: 20px;
      }

      /* 按钮系统 */
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
      button, .button {
        height: 36px;
        padding: 0 16px;
        font-size: 13px;
        font-weight: 500;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: white;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        transition: 0.2s;
      }
      button:hover { border-color: var(--text); background: #fafafa; }
      button.secondary { color: var(--muted); }
      button.success, .button.success { border-color: var(--success); color: var(--success); }
      button.success:hover { background: #ecfdf5; }
      button#build { background: var(--primary); color: white; border: none; }
      button#build:hover { opacity: 0.85; }
      
      button:disabled, .button.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

      .status { font-size: 12px; margin-top: 12px; min-height: 18px; color: var(--muted); font-weight: 500; }
      .status.error { color: var(--danger); }

      .footer { margin-top: 60px; text-align: center; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); padding-top: 24px; }

      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .toolbar { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Sub2Api Builder</h1>
        <p>本地静态工具，用于将 Token JSON 转换为标准 Payload 格式。</p>
      </header>

      <section class="toolbar" aria-label="转换配置">
        <div class="field">
          <label for="format">输出格式</label>
          <select id="format">
            <option value="sub2api">Sub2Api 格式</option>
          </select>
        </div>
        <div class="field">
          <label for="platform">Platform</label>
          <input id="platform" value="openai" />
        </div>
        <div class="field">
          <label for="accountType">Account Type</label>
          <input id="accountType" value="oauth" />
        </div>
        <div class="field">
          <label for="concurrency">Concurrency</label>
          <input id="concurrency" type="number" min="0" value="3" />
        </div>
        <div class="field">
          <label for="priority">Priority</label>
          <input id="priority" type="number" min="0" value="50" />
        </div>
        <div class="field">
          <label for="nameSource">Name Source</label>
          <select id="nameSource">
            <option value="email">email / account_id</option>
            <option value="filename">filename</option>
            <option value="index">index</option>
          </select>
        </div>
        <div class="field span-2">
          <label for="namePrefix">Name Prefix</label>
          <input id="namePrefix" value="acc" />
        </div>
        <div class="field span-2">
          <label for="outputName">输出文件名</label>
          <input id="outputName" value="sub2api_accounts_import.json" />
        </div>
        <div class="hint">
          生成结构包含 <code>type/version/exported_at/proxies/accounts</code>。支持批量文件及数组解析。
        </div>
      </section>

      <section class="grid">
        <div class="workspace">
          <div class="title">
            <h2>输入源</h2>
            <span id="inputBadge" class="badge">0 files</span>
          </div>

          <div id="dropzone" class="dropzone">
            <strong>拖拽 JSON 到此处</strong>
            <span>或点击下方按钮选择文件</span>
          </div>

          <div class="actions">
            <button id="chooseFiles" type="button">选择文件</button>
            <button id="clearInput" type="button" class="secondary">清空</button>
            <input id="fileInput" type="file" accept=".json,application/json" multiple hidden />
          </div>

          <div id="fileList" class="file-list">还没有选择文件。</div>

          <label for="pasteInput" style="display: block; margin-top: 18px;">或粘贴代码</label>
          <textarea id="pasteInput" class="paste-area" placeholder="粘贴单个对象或数组..."></textarea>

          <div class="actions">
            <button id="build" type="button">开始转换</button>
            <button id="loadExample" type="button" class="success">加载示例</button>
          </div>
          <div id="status" class="status"></div>
        </div>

        <div class="workspace">
          <div class="title">
            <h2>预览结果</h2>
            <span id="resultBadge" class="badge">0 accounts</span>
          </div>
          <textarea id="result" class="result" readonly placeholder="Output will appear here..."></textarea>
          <div class="actions">
            <button id="copy" type="button" class="success" disabled>复制</button>
            <a id="download" class="button disabled" href="#" download="sub2api_accounts_import.json" aria-disabled="true">下载</a>
            <button id="clearOutput" type="button" class="secondary">清空</button>
          </div>
        </div>
      </section>

      <div class="footer">Static Tool &middot; GitHub Pages Hosted &middot; No Backend</div>
    </main>

    <script>
      /* 这里的 JS 逻辑与源文件 100% 一致，未做任何修改 */
      const state = { files: [], objectUrl: null };
      const $ = (id) => document.getElementById(id);
      const elements = {
        accountType: $("accountType"), build: $("build"), chooseFiles: $("chooseFiles"),
        clearInput: $("clearInput"), clearOutput: $("clearOutput"), concurrency: $("concurrency"),
        copy: $("copy"), download: $("download"), dropzone: $("dropzone"),
        fileInput: $("fileInput"), fileList: $("fileList"), inputBadge: $("inputBadge"),
        loadExample: $("loadExample"), namePrefix: $("namePrefix"), nameSource: $("nameSource"),
        outputName: $("outputName"), pasteInput: $("pasteInput"), platform: $("platform"),
        priority: $("priority"), result: $("result"), resultBadge: $("resultBadge"), status: $("status")
      };

      function normalizeRecords(data) { return Array.isArray(data) ? data : [data]; }
      function stem(filename) { return filename.replace(/\.[^.]+$/, ""); }
      function chooseName(credentials, fileName, index, nameSource, namePrefix) {
        if (nameSource === "index") return `${namePrefix}-${String(index).padStart(3, "0")}`;
        if (nameSource === "email") {
          const email = String(credentials.email || "").trim();
          if (email) return email;
          const accountId = String(credentials.account_id || "").trim();
          if (accountId) return accountId;
        }
        return stem(fileName);
      }
      function dedupeName(name, used) {
        used[name] = (used[name] || 0) + 1;
        return used[name] === 1 ? name : `${name}-${used[name]}`;
      }
      function parseNonNegativeInt(value, fieldName) {
        const parsed = Number.parseInt(value, 10);
        if (!Number.isFinite(parsed) || parsed < 0) throw new Error(`${fieldName} 必须是大于等于 0 的整数。`);
        return parsed;
      }
      function setStatus(message, isError = false) {
        elements.status.textContent = message;
        elements.status.classList.toggle("error", isError);
      }
      function refreshFileList() {
        elements.inputBadge.textContent = `${state.files.length} files`;
        if (!state.files.length) { elements.fileList.textContent = "还没有选择文件。"; return; }
        elements.fileList.innerHTML = state.files.slice().sort((a, b) => a.name.localeCompare(b.name))
          .map((file) => `${escapeHtml(file.name)} <small>(${formatBytes(file.size)})</small>`).join("<br>");
      }
      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }
      function escapeHtml(value) {
        return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }
      async function readFileRecord(file) {
        const text = await file.text();
        return { fileName: file.name, data: JSON.parse(text) };
      }
      function readPastedRecords() {
        const text = elements.pasteInput.value.trim();
        if (!text) return [];
        return [{ fileName: "pasted-json", data: JSON.parse(text) }];
      }
      async function buildPayload() {
        const records = [];
        const sortedFiles = state.files.slice().sort((a, b) => a.name.localeCompare(b.name));
        for (const file of sortedFiles) { records.push(await readFileRecord(file)); }
        records.push(...readPastedRecords());
        if (!records.length) throw new Error("请先选择 JSON 文件，或粘贴 JSON 内容。");
        const platform = elements.platform.value.trim() || "openai";
        const accountType = elements.accountType.value.trim() || "oauth";
        const concurrency = parseNonNegativeInt(elements.concurrency.value, "Concurrency");
        const priority = parseNonNegativeInt(elements.priority.value, "Priority");
        const nameSource = elements.nameSource.value;
        const namePrefix = elements.namePrefix.value.trim() || "acc";
        const accounts = [];
        const usedNames = {};
        let counter = 1;
        for (const record of records) {
          for (const item of normalizeRecords(record.data)) {
            const credentials = item && typeof item === "object" && !Array.isArray(item) ? item : { raw_value: item };
            const baseName = chooseName(credentials, record.fileName, counter, nameSource, namePrefix);
            const name = dedupeName(baseName, usedNames);
            accounts.push({ name, platform, type: accountType, credentials, concurrency, priority });
            counter += 1;
          }
        }
        return { type: "sub2api-data", version: 1, exported_at: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"), proxies: [], accounts };
      }
      function setDownload(jsonText) {
        if (state.objectUrl) { URL.revokeObjectURL(state.objectUrl); }
        const blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
        state.objectUrl = URL.createObjectURL(blob);
        const outputName = elements.outputName.value.trim() || "sub2api_accounts_import.json";
        elements.download.href = state.objectUrl;
        elements.download.download = outputName;
        elements.download.classList.remove("disabled");
        elements.download.setAttribute("aria-disabled", "false");
        elements.copy.disabled = false;
      }
      function clearOutput() {
        elements.result.value = "";
        elements.resultBadge.textContent = "0 accounts";
        elements.copy.disabled = true;
        elements.download.classList.add("disabled");
        elements.download.setAttribute("aria-disabled", "true");
        elements.download.removeAttribute("href");
        if (state.objectUrl) { URL.revokeObjectURL(state.objectUrl); state.objectUrl = null; }
      }
      elements.chooseFiles.addEventListener("click", () => elements.fileInput.click());
      elements.fileInput.addEventListener("change", (event) => { state.files = Array.from(event.target.files || []); refreshFileList(); setStatus(`已选择 ${state.files.length} 个文件。`); });
      elements.clearInput.addEventListener("click", () => { state.files = []; elements.fileInput.value = ""; elements.pasteInput.value = ""; refreshFileList(); setStatus("输入已清空。"); });
      elements.clearOutput.addEventListener("click", () => { clearOutput(); setStatus("输出已清空。"); });
      elements.dropzone.addEventListener("dragover", (event) => { event.preventDefault(); elements.dropzone.classList.add("active"); });
      elements.dropzone.addEventListener("dragleave", () => { elements.dropzone.classList.remove("active"); });
      elements.dropzone.addEventListener("drop", (event) => { event.preventDefault(); elements.dropzone.classList.remove("active"); state.files = Array.from(event.dataTransfer.files || []).filter((file) => /\.json$/i.test(file.name)); refreshFileList(); setStatus(`已拖入 ${state.files.length} 个 JSON 文件。`); });
      elements.build.addEventListener("click", async () => {
        try {
          setStatus("正在转换..."); clearOutput();
          const payload = await buildPayload();
          const jsonText = JSON.stringify(payload, null, 2);
          elements.result.value = jsonText;
          elements.resultBadge.textContent = `${payload.accounts.length} accounts`;
          setDownload(jsonText);
          setStatus(`转换完成：${payload.accounts.length} 个账号。`);
        } catch (error) { setStatus(error instanceof Error ? error.message : String(error), true); }
      });
      elements.copy.addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(elements.result.value); setStatus("已复制到剪贴板。"); } catch (error) { setStatus("复制失败，请手动选中结果复制。", true); }
      });
      elements.download.addEventListener("click", (event) => { if (elements.download.classList.contains("disabled")) { event.preventDefault(); } });
      elements.loadExample.addEventListener("click", () => {
        elements.pasteInput.value = JSON.stringify([{ email: "demo@example.com", access_token: "access-token-example", account_id: "acct_demo" }], null, 2);
        setStatus("示例 JSON 已加载。");
      });
      window.addEventListener("beforeunload", () => { if (state.objectUrl) { URL.revokeObjectURL(state.objectUrl); } });
    </script>
  </body>
</html>
